name: tradingagents-report

services:
  tradingagents-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.core
      args:
        PYTHON_IMAGE: ${TRADINGAGENTS_PYTHON_IMAGE:-python:3.12-slim}
    env_file:
      - path: ../tg-core/.env
        required: false
    environment:
      - TRADINGAGENTS_API_KEY=${TRADINGAGENTS_API_KEY:?set TRADINGAGENTS_API_KEY in .env}
      - TRADINGAGENTS_DATABASE_URL=postgresql://tradingagents:${TRADINGAGENTS_POSTGRES_PASSWORD:?set TRADINGAGENTS_POSTGRES_PASSWORD in .env}@postgres:5432/tradingagents
    entrypoint:
      - uvicorn
    command:
      - api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=tradingagents
      - POSTGRES_USER=tradingagents
      - POSTGRES_PASSWORD=${TRADINGAGENTS_POSTGRES_PASSWORD:?set TRADINGAGENTS_POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingagents -d tradingagents"]
      interval: 5s
      timeout: 5s
      retries: 10

  tradingagents-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    environment:
      PORT: "8787"
      DATABASE_URL: postgresql://tradingagents:${TRADINGAGENTS_POSTGRES_PASSWORD:?set TRADINGAGENTS_POSTGRES_PASSWORD in tg-core/.env}@postgres:5432/tradingagents
      CORE_API_URL: http://tradingagents-api:8000
      CORE_API_KEY: ${TRADINGAGENTS_API_KEY:?set TRADINGAGENTS_API_KEY in tg-core/.env}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      tradingagents-api:
        condition: service_started
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8787/api/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    profiles:
      - web

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles:
      - web

volumes:
  tradingagents_data:
  postgres_data:

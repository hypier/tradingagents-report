services:
  tradingagents:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${TRADINGAGENTS_PYTHON_IMAGE:-python:3.12-slim}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data/tradingagents_data:/home/appuser/.tradingagents
    command:
      - tradingagents
    tty: true
    stdin_open: true

  tradingagents-api:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${TRADINGAGENTS_PYTHON_IMAGE:-python:3.12-slim}
    env_file:
      - path: .env
        required: false
    environment:
      - TRADINGAGENTS_API_KEY=${TRADINGAGENTS_API_KEY:?set TRADINGAGENTS_API_KEY in .env}
      - TRADINGAGENTS_DATABASE_URL=postgresql://tradingagents:${TRADINGAGENTS_POSTGRES_PASSWORD:?set TRADINGAGENTS_POSTGRES_PASSWORD in .env}@postgres:5432/tradingagents
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data/tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8000/health'))['status'] == 'ok'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: ../frontend
    environment:
      - TRADINGAGENTS_API_KEY=${TRADINGAGENTS_API_KEY:?set TRADINGAGENTS_API_KEY in .env}
      - NGINX_ENVSUBST_FILTER=TRADINGAGENTS_API_KEY
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      tradingagents-api:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=tradingagents
      - POSTGRES_USER=tradingagents
      - POSTGRES_PASSWORD=${TRADINGAGENTS_POSTGRES_PASSWORD:?set TRADINGAGENTS_POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingagents -d tradingagents"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${TRADINGAGENTS_PYTHON_IMAGE:-python:3.12-slim}
    env_file:
      - path: .env
        required: false
    environment:
      - TRADINGAGENTS_LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    volumes:
      - ./data/tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    command:
      - tradingagents
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  ollama_data:
